<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Spotlight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="logo-container">
      <svg class="hex-icon" viewBox="0 0 100 116" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,4 96,28 96,88 50,112 4,88 4,28" fill="#061526" stroke="#0ea5e9" stroke-width="2.5"/>
        <text x="50" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="32" fill="#38bdf8">{∞}</text>
      </svg>
      <span class="team-badge">DEVOPS TEAM</span>
    </div>
    <h1 class="site-title">DevOps Spotlight</h1>
    <p class="site-subtitle">Retrospectiva técnica de sprints do time</p>
    <div class="terminal-line"><span class="prompt">$</span> git log --oneline --graph editions/</div>
  </header>

  <main>
    <div class="editions-grid" id="editions-grid"></div>
  </main>


<div class="modal-overlay" id="modal" hidden aria-modal="true" role="dialog">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="modal-close" id="modal-close" aria-label="Fechar">✕</button>
      </div>
      <div class="modal-body">
        <div class="work-cards-grid" id="modal-cards"></div>
      </div>
    </div>
  </div>

  <footer class="shortcuts-bar">
    <div class="shortcuts-inner" id="shortcuts-inner"></div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
