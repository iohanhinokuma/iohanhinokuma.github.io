<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Spotlight — Time & Galeria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { height: 100%; overflow: hidden; }

    .team-page {
      height: 100vh;
      display: grid;
      grid-template-rows: 44px 1fr;
      overflow: hidden;
      background: var(--bg);
    }

    /* ─── Top bar ─── */
    .team-topbar {
      background: #050c14;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
      user-select: none;
    }

    .topbar-back {
      font-family: var(--mono);
      font-size: 0.73rem;
      color: var(--text-muted);
      text-decoration: none;
      padding: 3px 8px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .topbar-back:hover { color: var(--text); background: var(--surface); }

    .topbar-sep { color: var(--border); }

    .topbar-title {
      font-family: var(--mono);
      font-size: 0.73rem;
      color: var(--text-dim);
    }

    /* ─── Two-panel layout ─── */
    .team-main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    .team-panel {
      padding: 1.75rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow: hidden;
    }

    .team-panel + .team-panel {
      border-left: 1px solid var(--border);
    }

    .panel-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .panel-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── Team members grid ─── */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 1rem;
      align-content: center;
      flex: 1;
    }

    /* ─── Gallery grid (2×2, fills remaining height) ─── */
    .gallery-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 0.85rem;
      flex: 1;
      min-height: 0;
    }

    .gallery-slot-2 {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      min-height: 0;
    }

    .gallery-slot-2 img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-empty-2 {
      border-style: dashed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      color: var(--text-dim);
      font-size: 0.7rem;
      cursor: default;
    }

    .gallery-add-2 {
      font-size: 1.5rem;
      line-height: 1;
      color: var(--border-hover);
    }
  </style>
</head>
<body>
<div class="team-page">

  <!-- ─── Top bar ───────────────────────────────────────── -->
  <div class="team-topbar">
    <a class="topbar-back" href="./">⌂ DevOps Spotlight</a>
    <span class="topbar-sep">·</span>
    <span class="topbar-title">// time &amp; galeria</span>
  </div>

  <!-- ─── Main ──────────────────────────────────────────── -->
  <div class="team-main">

    <!-- Time -->
    <div class="team-panel">
      <div class="panel-label">// time</div>
      <div class="members-grid">

        <div class="member-card">
          <div class="member-avatar">
            <div class="member-initials">IH</div>
            <img src="team/iohan.jpg" alt="Iohan" onerror="this.style.display='none'">
          </div>
          <div class="member-name">Iohan</div>
          <div class="member-role">DevOps Engineer</div>
        </div>

        <div class="member-card">
          <div class="member-avatar">
            <div class="member-initials">LC</div>
            <img src="team/lucas.jpg" alt="Lucas" onerror="this.style.display='none'">
          </div>
          <div class="member-name">Lucas</div>
          <div class="member-role">DevOps Engineer</div>
        </div>

        <div class="member-card">
          <div class="member-avatar">
            <div class="member-initials">TH</div>
            <img src="team/thayse.jpg" alt="Thayse" onerror="this.style.display='none'">
          </div>
          <div class="member-name">Thayse</div>
          <div class="member-role">Desenvolvedora</div>
        </div>

        <div class="member-card">
          <div class="member-avatar">
            <div class="member-initials">GU</div>
            <img src="team/gustavo.jpg" alt="Gustavo" onerror="this.style.display='none'">
          </div>
          <div class="member-name">Gustavo</div>
          <div class="member-role">Desenvolvedor</div>
        </div>

      </div>
    </div>

    <!-- Galeria -->
    <div class="team-panel">
      <div class="panel-label">// galeria</div>
      <!-- Para adicionar fotos: substitua gallery-slot-2 por <img src="gallery/foto.jpg"> -->
      <div class="gallery-grid-2">
        <div class="gallery-slot-2 gallery-empty-2"><span class="gallery-add-2">+</span><span>adicionar foto</span></div>
        <div class="gallery-slot-2 gallery-empty-2"><span class="gallery-add-2">+</span><span>adicionar foto</span></div>
        <div class="gallery-slot-2 gallery-empty-2"><span class="gallery-add-2">+</span><span>adicionar foto</span></div>
        <div class="gallery-slot-2 gallery-empty-2"><span class="gallery-add-2">+</span><span>adicionar foto</span></div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
